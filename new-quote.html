<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>idea-nova.pl - wyceny frontów</title><link rel="stylesheet" href="styles.css"></head><body onload="loadManualQuotePage()">
<div class="topbar"><div class="brand"><a href="panel.html">← idea-nova.pl - wyceny frontów</a></div><div><span id="user-email"></span> · <button class="btn btn-light" onclick="signOut()">Wyloguj</button></div></div>
<main class="container"><div id="msg" style="display:none;margin-bottom:16px"></div>
<div class="manual-header"><div><h1>Nowa wycena</h1><p>Dodaj zapytanie otrzymane e-mailem lub utworzone ręcznie.</p></div><button class="btn btn-primary" onclick="createManualQuote(this)">Utwórz wycenę</button></div>
<div class="manual-top-grid">
<section class="card"><div class="card-h"><h2 class="section-title">Dane klienta</h2></div><div class="card-b"><div class="grid grid-2">
<div><label>Imię i nazwisko *</label><input id="manual-name"></div><div><label>Firma</label><input id="manual-company"></div>
<div><label>E-mail</label><input id="manual-email" type="email"></div><div><label>Telefon</label><input id="manual-phone"></div>
<div><label>NIP</label><input id="manual-nip"></div><div><label>Adres</label><input id="manual-address"></div>
<div><label>Kod pocztowy</label><input id="manual-zip"></div><div><label>Miejscowość</label><input id="manual-city"></div>
</div></div></section>
<section class="card"><div class="card-h"><h2 class="section-title">Dane zapytania</h2></div><div class="card-b"><div class="grid">
<div><label>Źródło</label><select id="manual-source"><option value="email">E-mail</option><option value="manual">Ręcznie</option></select></div>
<div><label>Status początkowy</label><select id="manual-status"><option value="pricing">W trakcie wyceny</option><option value="new">Nowe</option></select></div>
<div><label>Treść zapytania / notatka</label><textarea id="manual-notes" placeholder="Wklej treść wiadomości klienta lub dodaj notatkę wewnętrzną"></textarea></div>
</div></div></section>
</div>
<section class="card"><div class="card-h"><h2 class="section-title">Fronty</h2><button class="btn btn-primary" onclick="openManualItemEditor()">＋ Dodaj front</button></div><div id="manual-items" class="manual-items"></div></section>
</main>
<div class="modal" id="manual-item-modal" aria-hidden="true"><div class="modal-backdrop" onclick="closeManualItemEditor()"></div><div class="modal-box modal-wide">
<div class="modal-head"><h2 id="manual-item-title">Dodaj front</h2><button class="modal-close" onclick="closeManualItemEditor()">×</button></div><div class="modal-body">
<input type="hidden" id="manual-item-index"><div class="grid grid-3">
<div><label>Nazwa frontu</label><input id="manual-item-name" placeholder="np. lewe górne"></div><div><label>Liczba sztuk</label><input id="manual-item-qty" type="number" min="1" value="1"></div><div><label>Pozycja</label><input id="manual-item-position" type="number" min="1"></div>
<div><label>Wysokość [mm]</label><input id="manual-item-height" type="number" min="1"></div><div><label>Szerokość [mm]</label><input id="manual-item-width" type="number" min="1"></div><div><label>Profil</label><select id="manual-item-profile"></select></div>
<div><label>Wykończenie</label><select id="manual-item-finish"></select></div><div class="col-span-2"><label>Wypełnienie</label><select id="manual-item-fill"></select></div></div>
<hr class="editor-divider"><h3>Zawiasy / otwory</h3><div class="grid grid-3">
<div><label>Rodzaj</label><select id="manual-hinges-type" onchange="refreshManualEditorVisibility()"><option>Brak</option><option>Otwory + zawiasy</option><option>Same otwory (bez zawiasów)</option></select></div>
<div class="manual-hinge-field"><label>Strona</label><select id="manual-hinge-side"><option>Lewa</option><option>Prawa</option></select></div><div class="manual-hinge-field"><label>Marka</label><select id="manual-hinge-brand"><option>Blum</option><option>Hettich</option></select></div>
<div class="manual-hinge-field"><label>Ilość</label><input id="manual-hinge-qty" type="number" min="1" max="6" value="2"></div><div class="manual-hinge-field"><label>Położenie</label><select id="manual-hinge-mode" onchange="refreshManualEditorVisibility()"><option value="symetryczne">Standard / symetryczne</option><option value="wlasne">Własne od dolnej krawędzi</option></select></div>
<div class="manual-hinge-positions col-span-2"><label>Pozycje od dołu [mm]</label><input id="manual-hinge-positions" placeholder="np. 100, 500, 900"></div></div>
<hr class="editor-divider"><h3>Szpros / usztywnienie</h3><div class="grid grid-3">
<div><label>Rodzaj</label><select id="manual-stiffener-type" onchange="refreshManualEditorVisibility()"><option>Brak</option><option>Szpros</option><option>Usztywnienie</option></select></div><div class="manual-stiffener-field"><label>Ilość</label><input id="manual-stiffener-qty" type="number" min="1" max="6" value="1"></div><div class="manual-stiffener-field"><label>Położenie</label><select id="manual-stiffener-mode" onchange="refreshManualEditorVisibility()"><option value="symetryczne">Standard / symetryczne</option><option value="wlasne">Własne od dolnej krawędzi</option></select></div>
<div class="manual-stiffener-positions col-span-3"><label>Pozycje od dołu [mm]</label><input id="manual-stiffener-positions" placeholder="np. 350, 700"></div></div>
<hr class="editor-divider"><div><label>Uwagi do frontu</label><textarea id="manual-item-notes"></textarea></div>
</div><div class="modal-actions"><button class="btn btn-light" onclick="closeManualItemEditor()">Anuluj</button><button class="btn btn-primary" onclick="saveManualDraftItem()">Zapisz front</button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="app.js"></script></body></html>
