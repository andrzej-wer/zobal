<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Idea Nova — Wycena</title><link rel="stylesheet" href="styles.css"></head><body onload="loadQuote()"><div class="topbar"><div class="brand"><a href="panel.html">← WYCENY</a></div><div><span id="user-email"></span> · <button class="btn btn-light" onclick="signOut()">Wyloguj</button></div></div><main class="container"><div id="msg" style="display:none;margin-bottom:16px"></div><div class="card" style="margin-bottom:18px"><div class="card-h"><h1 id="title" class="section-title">Wycena</h1><div class="toolbar"><select id="status"><option value="new">Nowe</option><option value="pricing">W trakcie wyceny</option><option value="ready">Gotowe</option><option value="sent">Wysłane</option><option value="revision">Do poprawy</option><option value="accepted">Zaakceptowane</option><option value="rejected">Odrzucone</option><option value="ordered">Zamówione</option><option value="completed">Zrealizowane</option></select><button class="btn btn-primary" onclick="saveQuote()">Zapisz</button></div></div></div><div class="split"><div class="grid"><section class="card"><div class="card-h"><h2 class="section-title">Pozycje klienta</h2></div><div class="table-wrap"><table><thead><tr><th>Poz.</th><th>Opis</th><th>Wymiar</th><th>Ilość</th><th>Cena netto/szt.</th><th>Wartość</th></tr></thead><tbody id="items-body"></tbody></table></div></section><section class="card"><div class="card-h"><h2 class="section-title">Kalkulacje Zobal — tylko wewnętrzne</h2></div><div class="card-b"><div id="zobal-list"></div><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><div class="grid grid-3"><div><label>Numer Zobal</label><input id="zobal-number"></div><div><label>Zakup netto</label><input id="zobal-purchase" type="number" step="0.01"></div><div><label>PDF Zobal</label><input id="zobal-file" type="file" accept="application/pdf"></div></div><button class="btn btn-primary" style="margin-top:12px" onclick="addZobal()">Dodaj kalkulację</button></div></section><section class="card"><div class="card-h"><h2 class="section-title">Dokumenty dla klienta</h2></div><div class="card-b" id="client-docs"></div></section></div><aside class="grid"><section class="card"><div class="card-h"><h2 class="section-title">Klient</h2></div><div class="card-b" id="customer"></div></section><section class="card"><div class="card-h"><h2 class="section-title">Notatki wewnętrzne</h2></div><div class="card-b"><textarea id="notes"></textarea></div></section><section class="card"><div class="card-b notice"><strong>Bezpieczeństwo</strong><br>PDF Zobal jest przechowywany w prywatnym bucketcie i nie występuje w sekcji dokumentów klienta.</div></section></aside></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="app.js"></script></body></html>
